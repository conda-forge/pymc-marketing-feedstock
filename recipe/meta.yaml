{% set python_min = "3.11" %}
{% set name = "pymc-marketing" %}
{% set version = "0.19.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 8e69869aaa63b63a7a51e9d7934f192c375f07ce459e06fe3cd0529f9faf7f22

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling <2
    - hatch-fancy-pypi-readme
    - pip
  run:
    - python >={{ python_min }}
    - arviz >=0.13.0,<1.0.0
    - matplotlib-base >=3.5.1
    - narwhals
    - numpy >=2.0
    - pandas
    - pydantic >=2.1.0
    - pymc >=5.28.1
    - pytensor >=2.38.2
    - scikit-learn >=1.1.1
    - seaborn >=0.12.2
    - tqdm
    - xarray >=2024.1.0
    - xarray-einstats >=0.5.1
    - pyprojroot
    - pymc-extras >=0.9.2
    - preliz >=0.20.0
    - pyyaml

test:
  imports:
    - pymc_marketing
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: Marketing Statistical Models in PyMC
  home: https://github.com/pymc-labs/pymc-marketing
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - maresb
    - twiecki
    - ricardoV94
    - drbenvincent
