{% set python_min = "3.11" %}
{% set name = "pymc-marketing" %}
{% set version = "0.18.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 00fd360f86fc1913814f27b07d0c6803d52acdf5b9434811a6fded3a5a3b5257

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling <2
    - hatch-fancy-pypi-readme
    - pip
  run:
    - narwhals
    - pyyaml
    - tqdm
    - python >={{ python_min }}
    - arviz >=0.13.0
    - matplotlib-base >=3.5.1
    - numpy >=2.0
    - pandas
    - pydantic >=2.1.0
    - pymc >=5.27.0
    - pytensor >=2.36.3
    - scikit-learn >=1.1.1
    - seaborn >=0.12.2
    - xarray >=2024.1.0
    - xarray-einstats >=0.5.1
    - pyprojroot
    - pymc-extras >=0.4.0
    - preliz >=0.20.0

test:
  imports:
    - pymc_marketing
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: Marketing Statistical Models in PyMC
  home: https://github.com/pymc-labs/pymc-marketing
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - maresb
    - twiecki
    - ricardoV94
    - drbenvincent
